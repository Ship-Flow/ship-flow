spring:
  application:
    name: userservice

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${POSTGRES_DB:shipflow}?currentSchema=users
    username: ${POSTGRES_USER:shipflow}
    password: ${POSTGRES_PASSWORD:1234}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: users
    show-sql: true

  cloud:
    openfeign:
      client:
        config:
          default:
            connectTimeout: 5000
            readTimeout: 5000

server:
  port: 8083

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always
  health:
    rabbit:
      enabled: false

keycloak:
  server-url: ${KEYCLOAK_SERVER_URL:http://localhost:9001}
  realm: master
  user-realm: shipflow
  admin-client-id: admin-cli
  admin-username: ${KEYCLOAK_ADMIN:admin}
  admin-password: ${KEYCLOAK_ADMIN_PASSWORD:admin1234}
  login-client-id: shipflow-api

security:
  oauth2:
    resourceserver:
      jwt:
        jwk-set-uri: ${KEYCLOAK_SERVER_URL:http://localhost:9001}/realms/shipflow/protocol/openid-connect/certs
