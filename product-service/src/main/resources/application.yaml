spring:
  application:
    name: product-service

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?currentSchema=product
    username: ${DB_USER:shipflow}
    password: ${DB_PASSWORD:1234}

  cloud:
    openfeign:
      client:
        config:
          default:
            connectTimeout: 5000
            readTimeout: 5000
            loggerLevel: full

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: product
    show-sql: true

server:
  port: 8090

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

logging:
  level:
    com.shipflow.product.infrastructure.client: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE