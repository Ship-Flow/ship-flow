x-service-env: &service-env
  DB_HOST: postgres
  POSTGRES_DB: ${POSTGRES_DB}
  POSTGRES_USER: ${POSTGRES_USER}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discoveryserver:8761/eureka/
  REDIS_HOST: redis
  REDIS_PORT: 6379

x-service-depends-on: &service-depends-on
  discoveryserver:
    condition: service_healthy
  postgres:
    condition: service_healthy

services:
  postgres:
    image: postgres:16
    container_name: shipflow-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - shipflow_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: shipflow-redis
    ports:
      - "6379:6379"

  discoveryserver:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: discovery-server
    container_name: shipflow-eureka
    ports:
      - "8761:8761"
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8761/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  companyservice:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: company-service
    ports:
      - "8080"
    environment:
      <<: *service-env
    depends_on:
      <<: *service-depends-on

  hubservice:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: hub-service
    ports:
      - "8080"
    environment:
      <<: *service-env
    depends_on:
      <<: *service-depends-on
      redis:
        condition: service_started

  notificationservice:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: notification-service
    ports:
      - "8080"
    environment:
      <<: *service-env
    depends_on:
      <<: *service-depends-on

  orderservice:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: order-service
    ports:
      - "8080"
    environment:
      <<: *service-env
    depends_on:
      <<: *service-depends-on

  productservice:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: product-service
    ports:
      - "8080"
    environment:
      <<: *service-env
    depends_on:
      <<: *service-depends-on

  shipmentservice:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: shipment-service
    ports:
      - "8080"
    environment:
      <<: *service-env
    depends_on:
      <<: *service-depends-on

  userservice:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: user-service
    ports:
      - "8080"
    environment:
      <<: *service-env
    depends_on:
      <<: *service-depends-on

  rabbitmq:
    image: rabbitmq:3-management
    container_name: shipflow-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - shipflow_rabbitmq_data:/var/lib/rabbitmq

volumes:
  shipflow_postgres_data:
  shipflow_rabbitmq_data: