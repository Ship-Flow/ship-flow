version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: shipflow-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - shipflow_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d

  redis:
    image: redis:7-alpine
    container_name: shipflow-redis
    ports:
      - "6379:6379"

  discoveryservice:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: discovery-server
    container_name: shipflow-eureka
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  hubservice:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: hub-service
    container_name: shipflow-hub
    ports:
      - "8080:8080"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discoveryservice:8761/eureka/
      - DB_HOST=postgres
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    depends_on:
      discoveryservice:
        condition: service_healthy
      postgres:
        condition: service_started

volumes:
  shipflow_postgres_data:
