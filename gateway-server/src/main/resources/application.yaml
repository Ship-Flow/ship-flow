server:
  port: 8000

spring:
  application:
    name: gateway-server

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user
              uri: lb://USERSERVICE
              predicates:
                - Path=/api/users/**, /api/auth/**

            - id: product
              uri: lb://PRODUCTSERVICE
              predicates:
                - Path=/api/companies/*/products/**

            - id: company
              uri: lb://COMPANYSERVICE
              predicates:
                - Path=/api/companies/**

            - id: order
              uri: lb://ORDERSERVICE
              predicates:
                - Path=/api/orders/**

            - id: shipment
              uri: lb://SHIPMENTSERVICE
              predicates:
                - Path=/api/shipments/**, /api/shipment-managers/**

            - id: notification
              uri: lb://NOTIFICATIONSERVICE
              predicates:
                - Path=/api/ai/**, /api/slack/**

            - id: hub
              uri: lb://HUBSERVICE
              predicates:
                - Path=/api/hubs/**, /api/hub-routes/**

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_SERVER_URL:http://localhost:9001}/realms/shipflow/protocol/openid-connect/certs

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_BASE_URL:http://localhost:9411}/api/v2/spans

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true